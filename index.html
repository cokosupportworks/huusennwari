<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>かずのふうせん - 特別支援教材</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: manipulation;
        }
        .balloon {
            position: absolute;
            cursor: pointer;
            transition: transform 0.1s ease-out;
            filter: drop-shadow(0 5px 15px rgba(255,255,255,0.2));
        }
        .balloon:active {
            transform: scale(1.2);
        }
        .pop-number {
            position: absolute;
            font-size: 8rem;
            color: white;
            font-weight: bold;
            pointer-events: none;
            animation: fadeUp 1s forwards;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
        }
        @keyframes fadeUp {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -100%) scale(1.5); opacity: 0; }
        }
        .star {
            position: absolute;
            color: #FFD700;
            pointer-events: none;
            animation: fall 2s linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        /* ゆらゆらアニメーション */
        .float-anim {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { margin-top: 0; margin-left: 0; }
            25% { margin-top: var(--move-y1, -10px); margin-left: var(--move-x1, 10px); }
            50% { margin-top: var(--move-y2, 10px); margin-left: var(--move-x2, -10px); }
            75% { margin-top: var(--move-y3, -10px); margin-left: var(--move-x3, -10px); }
        }
        /* クラッカーの紙吹雪アニメーション */
        .confetti {
            position: absolute;
            width: 15px;
            height: 30px;
            bottom: 0;
            left: 50%;
            pointer-events: none;
            animation: blast 3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 45;
        }
        @keyframes blast {
            0% { transform: translate(0, 0) rotate(0deg) scale(0.5); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1); opacity: 0; }
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<!-- 設定画面 (先生用) -->
<div id="settings-screen" class="fixed inset-0 bg-gray-900 text-white z-50 flex flex-col items-center justify-center p-6">
    <h1 class="text-3xl font-bold mb-8">せんせい用の せってい</h1>
    
    <div class="w-full max-w-md space-y-8 bg-gray-800 p-8 rounded-2xl">
        <div>
            <label class="block text-xl mb-4">ふうせんの かず: <span id="count-display" class="text-yellow-400 font-bold">5</span>こ</label>
            <input type="range" id="balloon-count" min="1" max="10" value="5" class="w-full h-4 bg-gray-700 rounded-lg appearance-none cursor-pointer">
        </div>

        <div class="flex items-center justify-between">
            <span class="text-xl">はいけいの いろ</span>
            <input type="color" id="bg-color" value="#000000" class="w-14 h-14 p-1 bg-gray-700 border-none rounded cursor-pointer">
        </div>

        <div class="flex items-center justify-between">
            <span class="text-xl">ふうせんの うごき</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="motion-toggle" class="sr-only peer" checked>
                <div class="w-14 h-7 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-blue-600"></div>
            </label>
        </div>

        <div>
            <label class="block text-xl mb-4">うごきの はげしさ: <span id="speed-display" class="text-yellow-400 font-bold">3</span></label>
            <input type="range" id="balloon-speed" min="1" max="5" value="3" class="w-full h-4 bg-gray-700 rounded-lg appearance-none cursor-pointer">
        </div>

        <div class="flex items-center justify-between">
            <span class="text-xl">よみあげ</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="voice-toggle" class="sr-only peer" checked>
                <div class="w-14 h-7 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-green-600"></div>
            </label>
        </div>

        <div class="flex items-center justify-between">
            <span class="text-xl">かずの じどうレベルアップ</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="auto-level-count-toggle" class="sr-only peer">
                <div class="w-14 h-7 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-pink-500"></div>
            </label>
        </div>

        <div class="flex items-center justify-between">
            <span class="text-xl">うごきの じどうレベルアップ</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="auto-level-speed-toggle" class="sr-only peer">
                <div class="w-14 h-7 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-purple-500"></div>
            </label>
        </div>

        <button id="start-btn" class="w-full py-4 bg-yellow-500 hover:bg-yellow-400 text-black text-2xl font-bold rounded-xl transition-colors">
            学習をはじめる
        </button>
    </div>
    <p class="mt-6 text-gray-400 text-sm">画面をリロードするといつでも設定に戻れます</p>
</div>

<!-- メイン学習画面 -->
<div id="game-screen" class="relative w-screen h-screen hidden">
    <!-- 残り個数のガイド -->
    <div id="guide-dots" class="absolute top-6 left-6 flex space-x-2"></div>
    
    <!-- 設定に戻る隠しボタン (左上隅) -->
    <div id="back-to-settings" class="absolute top-0 left-0 w-20 h-20 opacity-0 cursor-default"></div>

    <div id="balloon-container" class="w-full h-full"></div>
</div>

<!-- ご褒美画面 -->
<div id="reward-screen" class="fixed inset-0 bg-black bg-opacity-80 hidden flex flex-col items-center justify-center z-40">
    <div id="reward-message" class="text-white text-6xl font-bold mb-8 animate-bounce">できた！</div>
    <button id="retry-btn" class="px-8 py-4 bg-white text-black text-2xl rounded-full font-bold z-50">もういっかい</button>
</div>

<script>
    const settingsScreen = document.getElementById('settings-screen');
    const gameScreen = document.getElementById('game-screen');
    const rewardScreen = document.getElementById('reward-screen');
    const balloonContainer = document.getElementById('balloon-container');
    const guideDots = document.getElementById('guide-dots');
    
    const countInput = document.getElementById('balloon-count');
    const countDisplay = document.getElementById('count-display');
    const motionToggle = document.getElementById('motion-toggle');
    const speedInput = document.getElementById('balloon-speed');
    const speedDisplay = document.getElementById('speed-display');
    const voiceToggle = document.getElementById('voice-toggle');
    const autoLevelCountToggle = document.getElementById('auto-level-count-toggle');
    const autoLevelSpeedToggle = document.getElementById('auto-level-speed-toggle');
    const bgColorInput = document.getElementById('bg-color');
    const startBtn = document.getElementById('start-btn');
    const backBtn = document.getElementById('back-to-settings');
    const retryBtn = document.getElementById('retry-btn');
    const rewardMessage = document.getElementById('reward-message');

    let totalBalloons = 5;
    let poppedCount = 0;
    let balloonsPos = []; // 配置済みの風船の座標を記録する配列
    let playCount = 0; // 現在のプレイ回数を記録
    const MAX_PLAY_COUNT = 5; // 5回で終了
    const colors = ['#FF5252', '#448AFF', '#4CAF50', '#FFEB3B', '#E040FB', '#FF9800', '#00BCD4'];

    // 設定反映
    countInput.addEventListener('input', () => {
        countDisplay.textContent = countInput.value;
        totalBalloons = parseInt(countInput.value);
    });

    speedInput.addEventListener('input', () => {
        speedDisplay.textContent = speedInput.value;
    });

    // 設定に戻る (左上を長押しで戻れるようにする)
    let backTimer;
    backBtn.addEventListener('mousedown', () => { backTimer = setTimeout(() => location.reload(), 2000); });
    backBtn.addEventListener('mouseup', () => { clearTimeout(backTimer); });

    // リトライ/次へボタンの処理
    retryBtn.addEventListener('click', () => {
        rewardScreen.classList.add('hidden');
        
        // 残っている紙吹雪を消す
        document.querySelectorAll('.confetti').forEach(el => el.remove());

        // 5回クリアした場合は設定画面に戻って終了
        if (playCount >= MAX_PLAY_COUNT) {
            location.reload();
            return;
        }

        let countUp = false;
        let speedUp = false;

        // 数レベルアップ判定
        if (autoLevelCountToggle.checked && totalBalloons < 10) {
            totalBalloons++;
            countInput.value = totalBalloons;
            countDisplay.textContent = totalBalloons;
            countUp = true;
        }

        // 動きレベルアップ判定
        let currentSpeed = parseInt(speedInput.value);
        if (autoLevelSpeedToggle.checked && motionToggle.checked && currentSpeed < 5) {
            speedInput.value = currentSpeed + 1;
            speedDisplay.textContent = speedInput.value;
            speedUp = true;
        }

        // 音声フィードバック
        if (countUp && speedUp) {
            speak(`${totalBalloons}こ に なって、もっと はやく うごくよ！`);
        } else if (countUp) {
            speak(`${totalBalloons}こ に ちょうせん！`);
        } else if (speedUp) {
            speak("もっと はやく うごくよ！");
        } else {
            speak("もういっかい！");
        }
        
        // 少し待ってから開始（音声と被らないように）
        setTimeout(setupGame, 1000);
    });

    // 音声合成の準備
    const speak = (text) => {
        if (!voiceToggle.checked) return;
        window.speechSynthesis.cancel();
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'ja-JP';
        uttr.rate = 1.0;
        window.speechSynthesis.speak(uttr);
    };

    // 音声合成エンジンの初期化（IOSやブラウザの制限回避のため）
    function initSpeech() {
        if (voiceToggle.checked) {
            const uttr = new SpeechSynthesisUtterance('');
            uttr.volume = 0;
            window.speechSynthesis.speak(uttr);
        }
    }

    // 効果音 (Web Audio API)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playPopSound() {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1);
    }

    // ゲーム開始
    startBtn.addEventListener('click', () => {
        audioCtx.resume();
        initSpeech(); // 音声を鳴らせるように初期化
        document.body.style.backgroundColor = bgColorInput.value; // 背景色を適用
        settingsScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        playCount = 0; // プレイ回数をリセット
        setupGame();
    });

    function setupGame() {
        balloonContainer.innerHTML = '';
        guideDots.innerHTML = '';
        poppedCount = 0;
        balloonsPos = []; // 座標リセット

        // ガイドのドット作成
        for (let i = 0; i < totalBalloons; i++) {
            const dot = document.createElement('div');
            dot.className = 'w-6 h-6 rounded-full bg-gray-700 border border-gray-500';
            dot.id = `dot-${i}`;
            guideDots.appendChild(dot);
        }

        // 風船作成
        for (let i = 0; i < totalBalloons; i++) {
            createBalloon(i);
        }
    }

    function createBalloon(index) {
        const balloon = document.createElement('div');
        balloon.className = 'balloon';
        
        if (motionToggle.checked) {
            balloon.classList.add('float-anim');
            
            const speedLevel = parseInt(speedInput.value); // 1(ゆっくり) 〜 5(激しい)
            
            // アニメーションの速度と振り幅をはげしさレベルに応じて計算
            // 速度: levelが大きいほど速い（durationが短い）
            const baseDuration = 6 - speedLevel;
            balloon.style.animationDuration = `${baseDuration * 0.6 + Math.random() * 1.5}s`;
            balloon.style.animationDelay = `-${Math.random() * 5}s`;
            
            // 振り幅: levelが大きいほど広い範囲を動く
            const range = speedLevel * 60 + 50; 
            
            balloon.style.setProperty('--move-x1', `${(Math.random() - 0.5) * range}px`);
            balloon.style.setProperty('--move-y1', `${(Math.random() - 0.5) * range}px`);
            balloon.style.setProperty('--move-x2', `${(Math.random() - 0.5) * range}px`);
            balloon.style.setProperty('--move-y2', `${(Math.random() - 0.5) * range}px`);
            balloon.style.setProperty('--move-x3', `${(Math.random() - 0.5) * range}px`);
            balloon.style.setProperty('--move-y3', `${(Math.random() - 0.5) * range}px`);
        }
        
        // 数が多いと重なりやすくなるので、少しサイズを小さめに設定
        const size = Math.min(window.innerWidth, window.innerHeight) * 0.25;
        const color = colors[index % colors.length];
        
        // 重ならないように座標を探す（最大100回試行）
        let x, y;
        let attempts = 0;
        let overlapping = true;
        while (overlapping && attempts < 100) {
            x = Math.random() * (window.innerWidth - size);
            y = Math.random() * (window.innerHeight - size * 1.2);
            overlapping = false;
            for (let pos of balloonsPos) {
                const dx = x - pos.x;
                const dy = y - pos.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                // 中心同士の距離がサイズ以上離れていればOK（少し余裕を持たせる）
                if (distance < size * 1.1) {
                    overlapping = true;
                    break;
                }
            }
            attempts++;
        }
        // 見つかった座標を記録
        balloonsPos.push({x, y});
        
        balloon.style.left = `${x}px`;
        balloon.style.top = `${y}px`;
        balloon.style.width = `${size}px`;
        balloon.style.height = `${size * 1.2}px`;
        
        // SVGで風船を描画
        balloon.innerHTML = `
            <svg viewBox="0 0 100 120" width="100%" height="100%">
                <defs>
                    <radialGradient id="grad-${index}" cx="40%" cy="40%" r="50%" fx="30%" fy="30%">
                        <stop offset="0%" style="stop-color:white;stop-opacity:0.3" />
                        <stop offset="100%" style="stop-color:${color};stop-opacity:1" />
                    </radialGradient>
                </defs>
                <ellipse cx="50" cy="50" rx="45" ry="50" fill="url(#grad-${index})" />
                <path d="M50 100 L45 110 L55 110 Z" fill="${color}" />
                <path d="M50 110 Q55 115 50 120" stroke="white" stroke-width="2" fill="none" />
            </svg>
        `;

        balloon.addEventListener('pointerdown', (e) => {
            popBalloon(balloon, index, e.clientX, e.clientY);
        });

        balloonContainer.appendChild(balloon);
    }

    function popBalloon(element, index, x, y) {
        if (element.dataset.popped) return;
        element.dataset.popped = "true";
        
        poppedCount++;
        playPopSound();
        
        // 数字の表示
        const num = document.createElement('div');
        num.className = 'pop-number';
        num.textContent = poppedCount;
        num.style.left = `${x}px`;
        num.style.top = `${y}px`;
        document.body.appendChild(num);
        setTimeout(() => num.remove(), 1000);

        // ガイドのドットを光らせる
        const dot = document.getElementById(`dot-${poppedCount - 1}`);
        if (dot) {
            dot.className = 'w-6 h-6 rounded-full bg-yellow-400 border border-white shadow-lg';
        }

        // 音声読み上げ
        speak(poppedCount.toString());

        // 風船を消す
        element.style.transform = 'scale(2)';
        element.style.opacity = '0';
        setTimeout(() => element.remove(), 200);

        // 全部割ったかチェック
        if (poppedCount === totalBalloons) {
            setTimeout(showReward, 1000);
        }
    }

    function showReward() {
        rewardScreen.classList.remove('hidden');
        playCount++; // クリア回数を追加
        
        let confettiAmount = 150; // 通常の紙吹雪の量

        if (playCount >= MAX_PLAY_COUNT) {
            // 5回終了時の大クリア演出
            speak("5かい できたね！ おしまい！ よく がんばりました！");
            rewardMessage.textContent = "おしまい！";
            retryBtn.textContent = "せってい に もどる";
            confettiAmount = 300; // 紙吹雪を倍にして盛大に祝う
        } else {
            // 通常クリア時の演出
            speak("できたね！すごい！");
            rewardMessage.textContent = "できた！";
            
            const hasNextCount = autoLevelCountToggle.checked && totalBalloons < 10;
            const hasNextSpeed = autoLevelSpeedToggle.checked && motionToggle.checked && parseInt(speedInput.value) < 5;

            if (hasNextCount || hasNextSpeed) {
                retryBtn.textContent = "つぎの レベルへ！";
            } else {
                retryBtn.textContent = "もういっかい！";
            }
        }
        
        // 激しいクラッカーエフェクト（紙吹雪）
        const confettiColors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#42b983', '#00BCD4'];
        for (let i = 0; i < confettiAmount; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.backgroundColor = confettiColors[Math.floor(Math.random() * confettiColors.length)];
            
            // 四角形や細長い形をランダムに
            if (Math.random() > 0.5) confetti.style.borderRadius = '50%';
            confetti.style.width = (Math.random() * 15 + 5) + 'px';
            confetti.style.height = (Math.random() * 20 + 10) + 'px';

            // 飛び散る方向と距離を計算
            const tx = (Math.random() - 0.5) * window.innerWidth * 1.5;
            const ty = - (Math.random() * window.innerHeight * 1.2 + 100);
            const rot = Math.random() * 1080; // ぐるぐる回転

            confetti.style.setProperty('--tx', `${tx}px`);
            confetti.style.setProperty('--ty', `${ty}px`);
            confetti.style.setProperty('--rot', `${rot}deg`);
            
            // 吹き出すタイミングを少しずらす
            confetti.style.animationDelay = `${Math.random() * 0.3}s`;

            document.body.appendChild(confetti);
            
            // アニメーションが終わったら消す
            setTimeout(() => confetti.remove(), 3500);
        }
    }
</script>
</body>
</html>
